    <circle cx="570" cy="145" r="92" fill="#eef6ff" stroke="#b8d2eb" stroke-width="3"/>
    <circle cx="700" cy="160" r="112" fill="#eef6ff" stroke="#b8d2eb" stroke-width="3"/>
    <circle cx="850" cy="155" r="94" fill="#eef6ff" stroke="#b8d2eb" stroke-width="3"/>
    <circle cx="980" cy="180" r="78" fill="#eef6ff" stroke="#b8d2eb" stroke-width="3"/>
    <rect x="340" y="180" width="820" height="500" rx="34" ry="34" fill="#eef6ff" stroke="#b8d2eb" stroke-width="3"/>
    <text x="750" y="150" text-anchor="middle" class="cloudTitle">Volvo-Approved Azure Cloud</text>
    <text x="750" y="178" text-anchor="middle" class="cloudSub">Private internal application zone</text>
    <g transform="translate(706 92)">
      <path d="M20 35 C5 35 0 25 0 17 C0 7 8 0 18 0 C24 0 30 3 34 8 C38 4 44 2 50 2 C63 2 74 12 74 26 C84 27 92 35 92 45 C92 57 82 66 68 66 L20 66 C9 66 0 57 0 46 C0 39 8 35 20 35 Z" fill="#dcecff" stroke="#6c8ebf" stroke-width="3"/>
