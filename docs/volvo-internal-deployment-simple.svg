    <text x="1340" y="284" text-anchor="middle" class="p">Azure PostgreSQL</text>
  </g>

  <g>
    <rect x="1230" y="335" rx="22" ry="22" width="220" height="120" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
    <g transform="translate(1294 352)">
      <path d="M0 16 L24 0 L92 0 L68 16 Z" fill="none" class="iconStrokeRed"/>
      <path d="M0 16 L68 16 L68 44 L0 44 Z" fill="none" class="iconStrokeRed"/>
      <path d="M68 16 L92 0 L92 28 L68 44 Z" fill="none" class="iconStrokeRed"/>
