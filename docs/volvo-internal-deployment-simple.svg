      <rect x="0" y="22" width="58" height="14" rx="4" ry="4" fill="none" class="iconStrokeGreen"/>
      <rect x="0" y="44" width="58" height="14" rx="4" ry="4" fill="none" class="iconStrokeGreen"/>
      <circle cx="-14" cy="7" r="4" class="iconFillGreen"/>
      <circle cx="-14" cy="29" r="4" class="iconFillGreen"/>
      <circle cx="-14" cy="51" r="4" class="iconFillGreen"/>
    </g>
    <text x="1055" y="390" text-anchor="middle" class="h">Backend API</text>
    <text x="1055" y="418" text-anchor="middle" class="p">FastAPI</text>
    <text x="1055" y="442" text-anchor="middle" class="small">App Service / Container Apps</text>
  </g>

