    <text x="1340" y="425" text-anchor="middle" class="h">File Storage</text>
    <text x="1340" y="451" text-anchor="middle" class="p">Blob / ADLS</text>
  </g>

  <g>
    <rect x="1230" y="500" rx="22" ry="22" width="220" height="120" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
