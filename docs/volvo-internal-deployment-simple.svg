  <path d="M240 340 L380 340" class="lineBlue"/>
  <polygon points="370,334 380,340 370,346" fill="#6c8ebf"/>

  <path d="M570 340 L650 340" class="lineGreen"/>
  <polygon points="640,334 650,340 640,346" fill="#82b366"/>

  <path d="M860 340 L930 340" class="lineGreen"/>
  <polygon points="920,334 930,340 920,346" fill="#82b366"/>

  <path d="M1180 330 L1210 330 L1210 230 L1230 230" class="lineRed"/>
  <polygon points="1220,224 1230,230 1220,236" fill="#d26a5c"/>

  <path d="M1180 355 L1210 355 L1210 395 L1230 395" class="lineRed"/>
  <polygon points="1220,389 1230,395 1220,401" fill="#d26a5c"/>

  <path d="M1180 380 L1210 380 L1210 560 L1230 560" class="linePurple"/>
  <polygon points="1220,554 1230,560 1220,566" fill="#9673a6"/>

  <g>
    <rect x="540" y="520" rx="20" ry="20" width="450" height="130" fill="#fff7d6" stroke="#d6b656" stroke-width="2"/>
    <text x="765" y="555" text-anchor="middle" class="h">Cloud deployment changes</text>
    <text x="580" y="592" class="small">1. SQLite -&gt; PostgreSQL</text>
    <text x="580" y="620" class="small">2. Local uploads folder -&gt; Blob / ADLS</text>
    <text x="580" y="648" class="small">3. localhost API -&gt; internal cloud URL</text>
