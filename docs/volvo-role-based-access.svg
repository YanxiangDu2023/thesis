    <circle cx="610" cy="140" r="96" fill="#eef6ff" stroke="#b8d2eb" stroke-width="3"/>
    <circle cx="760" cy="150" r="118" fill="#eef6ff" stroke="#b8d2eb" stroke-width="3"/>
    <circle cx="920" cy="145" r="96" fill="#eef6ff" stroke="#b8d2eb" stroke-width="3"/>
    <circle cx="1035" cy="175" r="82" fill="#eef6ff" stroke="#b8d2eb" stroke-width="3"/>
    <rect x="300" y="175" width="1080" height="560" rx="34" ry="34" fill="#eef6ff" stroke="#b8d2eb" stroke-width="3"/>
