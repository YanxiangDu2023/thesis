<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860">
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .cloudTitle { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #2b5c88; }
      .h { font: 700 21px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .p { font: 16px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .small { font: 15px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .lineOrange { stroke: #d79b00; stroke-width: 3; fill: none; }
      .lineBlue { stroke: #6c8ebf; stroke-width: 3; fill: none; }
      .lineGreen { stroke: #82b366; stroke-width: 3; fill: none; }
      .linePurple { stroke: #9673a6; stroke-width: 3; fill: none; }
      .lineRed { stroke: #d26a5c; stroke-width: 3; fill: none; }
      .iconStrokeDark { stroke: #35536b; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .iconStrokeGold { stroke: #a67c00; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .iconStrokeGreen { stroke: #477a2c; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .iconStrokePurple { stroke: #6d4f80; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .iconStrokeRed { stroke: #8d3e38; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .iconFillBlue { fill: #9bb9e7; stroke: none; }
      .iconFillGold { fill: #f2b632; stroke: none; }
      .iconFillGreen { fill: #82b366; stroke: none; }
      .iconFillPurple { fill: #9673a6; stroke: none; }
