    <text x="1375" y="594" text-anchor="middle" class="h">Reports</text>
    <text x="1375" y="620" text-anchor="middle" class="p">View / export</text>
  </g>

  <path d="M 240 290 L 390 380" class="lineOrange"/>
  <polygon points="379,377 390,380 383,389" fill="#d79b00"/>

  <path d="M 240 500 L 390 410" class="lineBlue"/>
  <polygon points="382,401 390,410 379,411" fill="#6c8ebf"/>

  <path d="M 630 395 L 700 395" class="lineGreen"/>
  <polygon points="690,389 700,395 690,401" fill="#82b366"/>

  <path d="M 930 395 L 1000 395" class="lineGreen"/>
  <polygon points="990,389 1000,395 990,401" fill="#82b366"/>

  <path d="M 1115 460 L 1115 515" class="linePurple"/>
  <polygon points="1109,505 1115,515 1121,505" fill="#9673a6"/>

  <path d="M 1230 370 L 1260 370 L 1260 280 L 1290 280" class="lineRed"/>
  <polygon points="1280,274 1290,280 1280,286" fill="#d26a5c"/>

  <path d="M 1230 395 L 1260 395 L 1260 430 L 1290 430" class="lineRed"/>
  <polygon points="1280,424 1290,430 1280,436" fill="#d26a5c"/>

  <path d="M 1230 420 L 1260 420 L 1260 580 L 1290 580" class="lineRed"/>
  <polygon points="1280,574 1290,580 1280,586" fill="#d26a5c"/>

  <g>
    <rect x="520" y="655" rx="18" ry="18" width="500" height="70" fill="#fff7d6" stroke="#d6b656" stroke-width="2"/>
    <text x="770" y="690" text-anchor="middle" class="h">One app, two roles</text>
    <text x="770" y="715" text-anchor="middle" class="p">This is usually role-based access, not two separate frontends.</text>
  </g>
</svg>
