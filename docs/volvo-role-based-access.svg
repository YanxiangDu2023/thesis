      <rect x="0" y="44" width="58" height="14" rx="4" ry="4" fill="none" class="iconStrokeGreen"/>
      <circle cx="-14" cy="7" r="4" class="iconFillGreen"/>
      <circle cx="-14" cy="29" r="4" class="iconFillGreen"/>
      <circle cx="-14" cy="51" r="4" class="iconFillGreen"/>
