    <text x="1115" y="426" text-anchor="middle" class="p">FastAPI</text>
    <text x="1115" y="450" text-anchor="middle" class="small">Role checks enforced</text>
  </g>

  <g>
    <rect x="1000" y="515" rx="22" ry="22" width="230" height="120" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
    <g transform="translate(1078 532)">
